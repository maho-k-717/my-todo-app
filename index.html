<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italian Horizon - Fast Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --bg-1: url('https://images.unsplash.com/photo-1514890547357-a9ee288728e0?q=80&w=1600&auto=format&fit=crop'); 
            --bg-2: url('https://images.unsplash.com/photo-1528114039593-4366cc08227d?q=80&w=1600&auto=format&fit=crop'); 
            /* 3枚目：引きのローマ街並みパノラマ */
            --bg-3: url('https://images.unsplash.com/photo-1531572753322-ad063cecc140?q=80&w=1600&auto=format&fit=crop'); 
        }

        body {
            margin: 0; font-family: 'Quicksand', 'Noto Sans JP', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px; color: #2c2c2c;
            overflow-x: hidden; position: relative;
        }

        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; background-attachment: fixed;
            /* 切り替え時間を0.5秒に短縮 */
            transition: opacity 0.5s ease-out; 
        }
        .bg-back { z-index: -2; opacity: 1; }
        .bg-front { z-index: -1; opacity: 0; }

        .bg-switcher {
            margin-bottom: 30px; background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px); padding: 12px 25px;
            border-radius: 50px; display: flex; gap: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
        }
        .bg-btn {
            width: 35px; height: 35px; border-radius: 50%; border: 2px solid white;
            cursor: pointer; transition: 0.2s; background-size: cover; background-position: center;
        }
        .bg-btn:active { transform: scale(0.9); } /* 押した感を出す */

        .board-container {
            display: flex; gap: 20px; width: 100%; max-width: 1200px;
            justify-content: center; align-items: flex-start;
        }

        .column {
            flex: 1; min-width: 300px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 30px; padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        h2 { font-size: 0.8rem; text-align: center; letter-spacing: 0.4em; margin-bottom: 25px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .input-group { display: flex; background: rgba(255, 255, 255, 0.9); border-radius: 16px; padding: 5px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: none; background: transparent; outline: none; font-family: inherit; }
        .add-btn { background: none; border: none; font-size: 1.8rem; color: #555; cursor: pointer; padding-right: 10px; }

        .task-list { list-style: none; padding: 0; min-height: 200px; }
        .task-item {
            background: white; margin-bottom: 12px; padding: 16px 20px;
            border-radius: 18px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .task-item:hover { transform: translateY(-2px); }

        .archive-trigger {
            position: fixed; bottom: 20px; right: 30px;
            color: rgba(255,255,255,0.7); font-size: 0.8rem;
            cursor: pointer; text-decoration: none; letter-spacing: 0.2em;
            transition: 0.3s; z-index: 100;
        }

        #archive-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(40px);
            z-index: 1000; display: none; justify-content: center; align-items: center;
        }
        .archive-content {
            width: 90%; max-width: 500px; height: 75vh;
            background: rgba(255,255,255,0.1); border-radius: 30px;
            padding: 40px; color: #fff; display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.2); position: relative;
        }
        .close-archive { position: absolute; top: 20px; right: 25px; cursor: pointer; font-size: 1.5rem; opacity: 0.7; }
        .archive-list { list-style: none; padding: 0; overflow-y: auto; flex: 1; }
        .archive-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        
        .delete-all-btn {
            background: rgba(255, 70, 70, 0.2); color: #ff9999; border: 1px solid rgba(255, 70, 70, 0.3);
            padding: 10px; border-radius: 12px; font-size: 0.7rem; cursor: pointer;
            letter-spacing: 0.1em; transition: 0.3s; margin-top: 20px; width: 100%;
        }
        .delete-all-btn:hover { background: rgba(255, 70, 70, 0.6); color: #fff; }

        .single-delete-btn { color: rgba(255,255,255,0.3); cursor: pointer; font-size: 0.9rem; padding: 5px; }

        @media (max-width: 900px) {
            .board-container { flex-direction: column; align-items: center; }
            .column { width: 90%; }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="bg-layer bg-back"></div>
        <div class="bg-layer bg-front"></div>
    </div>

    <div class="bg-switcher">
        <div class="bg-btn" style="background-image: var(--bg-1);" onclick="handleBgChange(1)"></div>
        <div class="bg-btn" style="background-image: var(--bg-2);" onclick="handleBgChange(2)"></div>
        <div class="bg-btn" style="background-image: var(--bg-3);" onclick="handleBgChange(3)"></div>
    </div>

    <div class="board-container">
        <div class="column" id="col-today">
            <h2>TODAY</h2>
            <div class="input-group">
                <input type="text" placeholder="Andiamo! (さあやろう)">
                <button class="add-btn" onclick="addNewTask('today')">+</button>
            </div>
            <ul class="task-list" id="list-today"></ul>
        </div>
        <div class="column" id="col-tomorrow">
            <h2>TOMORROW</h2>
            <div class="input-group">
                <input type="text" placeholder="Domani... (明日の予定)">
                <button class="add-btn" onclick="addNewTask('tomorrow')">+</button>
            </div>
            <ul class="task-list" id="list-tomorrow"></ul>
        </div>
        <div class="column" id="col-someday">
            <h2>SOMEDAY</h2>
            <div class="input-group">
                <input type="text" placeholder="Un giorno... (いつか)">
                <button class="add-btn" onclick="addNewTask('someday')">+</button>
            </div>
            <ul class="task-list" id="list-someday"></ul>
        </div>
    </div>

    <div class="archive-trigger" onclick="toggleArchive(true)">Archivio (アーカイブを表示)</div>

    <div id="archive-overlay">
        <div class="archive-content">
            <span class="close-archive" onclick="toggleArchive(false)">×</span>
            <div class="archive-header">
                <h3 style="letter-spacing: 0.3em;">COMPLETED</h3>
            </div>
            <ul id="archive-list" class="archive-list"></ul>
            <p id="empty-msg" style="text-align: center; opacity: 0.5; margin-top: 50px; display: none;">アーカイブは空です</p>
            <button id="clear-archive-btn" class="delete-all-btn" onclick="clearAllArchive()">
                CLEAR ALL ARCHIVE (すべて完全に消去)
            </button>
        </div>
    </div>

    <script>
        const columnIds = ['today', 'tomorrow', 'someday'];
        let currentBgNum = 1;
        let isChanging = false;

        function handleBgChange(num) {
            if (num === currentBgNum || isChanging) return;
            isChanging = true;
            const bgBack = document.querySelector('.bg-back');
            const bgFront = document.querySelector('.bg-front');
            bgFront.style.backgroundImage = `var(--bg-${num})`;
            bgFront.style.opacity = 1;
            
            // 0.5秒後に確定させる（アニメーション時間に合わせる）
            setTimeout(() => {
                bgBack.style.backgroundImage = `var(--bg-${num})`;
                bgFront.style.opacity = 0;
                currentBgNum = num;
                isChanging = false;
            }, 550);
        }

        function addNewTask(id) {
            const input = document.querySelector(`#col-${id} input`);
            const text = input.value.trim();
            if (text) {
                createTaskElement(id, text);
                saveAll();
                input.value = '';
            }
        }

        function createTaskElement(colId, text) {
            const list = document.getElementById(`list-${colId}`);
            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `<span>${text}</span>`;
            li.onclick = () => {
                li.style.transform = "translateX(50px)";
                li.style.opacity = "0";
                setTimeout(() => {
                    addToArchive(text);
                    li.remove();
                    saveAll();
                }, 200);
            };
            list.appendChild(li);
        }

        function addToArchive(text) {
            const archived = JSON.parse(localStorage.getItem('italy-archived')) || [];
            archived.unshift({ text: text, date: new Date().toLocaleString() });
            localStorage.setItem('italy-archived', JSON.stringify(archived));
            renderArchive();
        }

        function toggleArchive(show) {
            document.getElementById('archive-overlay').style.display = show ? 'flex' : 'none';
            if (show) renderArchive();
        }

        function deleteArchivedItem(index) {
            if (confirm("このタスクを完全に消去します。よろしいですか？")) {
                let archived = JSON.parse(localStorage.getItem('italy-archived')) || [];
                archived.splice(index, 1);
                localStorage.setItem('italy-archived', JSON.stringify(archived));
                renderArchive();
            }
        }

        function clearAllArchive() {
            if (confirm("すべてのアーカイブを完全に消去します。元には戻せません。よろしいですか？")) {
                localStorage.removeItem('italy-archived');
                renderArchive();
            }
        }

        function renderArchive() {
            const archived = JSON.parse(localStorage.getItem('italy-archived')) || [];
            const list = document.getElementById('archive-list');
            const msg = document.getElementById('empty-msg');
            const clearBtn = document.getElementById('clear-archive-btn');
            list.innerHTML = '';
            if (archived.length === 0) {
                msg.style.display = 'block';
                clearBtn.style.display = 'none';
            } else {
                msg.style.display = 'none';
                clearBtn.style.display = 'block';
                archived.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = 'archive-item';
                    li.innerHTML = `
                        <div style="display:flex; flex-direction:column; gap:4px;">
                            <span>${item.text}</span>
                            <span style="font-size:0.7rem; opacity:0.4;">${item.date}</span>
                        </div>
                        <span class="single-delete-btn" onclick="deleteArchivedItem(${index})">✕</span>
                    `;
                    list.appendChild(li);
                });
            }
        }

        function saveAll() {
            columnIds.forEach(id => {
                const tasks = Array.from(document.querySelectorAll(`#list-${id} .task-item`)).map(li => ({
                    text: li.querySelector('span').innerText
                }));
                localStorage.setItem(`italy-tasks-${id}`, JSON.stringify(tasks));
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            // 最初は必ず1枚目（ベネチア）を表示
            document.querySelector('.bg-back').style.backgroundImage = `var(--bg-1)`;
            columnIds.forEach(id => {
                const saved = JSON.parse(localStorage.getItem(`italy-tasks-${id}`)) || [];
                saved.forEach(task => createTaskElement(id, task.text));
                const input = document.querySelector(`#col-${id} input`);
                input.onkeypress = (e) => { if(e.key === 'Enter') addNewTask(id); };
                new Sortable(document.getElementById(`list-${id}`), {
                    group: 'italy-tasks', animation: 150, onEnd: () => saveAll()
                });
            });
            renderArchive();
        });
    </script>
</body>
</html>
